# Location of quadlet directories or files. E.g.: 
#
# /path/to/quadlets
#   /quadlet1
#     /quadlet1.container
#   /quadlet2
#     /quadlet2.pod
#     /quadlet2.container
#
# Defaults to $HOME/.local/quadlets
#
#   NOTE: Environment variables are not evaluated by quadctl. Replace  with explicit values
#
quadlet.src.path={{.home}}/.local/quadlets

# Podman Quadlet Generator directories to use
#
#   For rootful containers, any of:
#     /etc/containers/systemd
#     /run/containers/systemd
#     /usr/share/containers/systemd
#
#   For rootless containers, any of: 
#     $XDG_RUNTIME_DIR/containers/systemd/
#     $XDG_CONFIG_HOME/containers/systemd/ or ~/.config/containers/systemd/
#     /etc/containers/systemd/users
#     /etc/containers/systemd/users/${UID}
#     /etc/containers/systemd/users/
#     /usr/share/containers/systemd/users/${UID}
#     /usr/share/containers/systemd/users/
#
#   NOTE: Environment variables are not evaluated by quadctl. Replace  with explicit values
#
quadlet.root.path=/etc/containers/systemd
quadlet.user.path={{.home}}/.config/containers/systemd

# Install quadlet files with dedicated subdirectories to keep them organized
use_subdirectories=true

# Install symbolic links to systemd generator directories if true or copy files if false (default false)  
use_symbolic_links=false

# Remove volumes when removing (uninstalling) quadlets (default true)
remove_volumes=true

# Remove networks when removing (uninstalling) quadlets (default true)
remove_networks=true

# Systemd commands used when -s flag is provided. The {{.user}} is a variable to be replaced with --user when rootless. 
systemd.reload=systemctl {{.user}} daemon-reload
systemd.start=systemctl {{.user}} start
systemd.stop=systemctl {{.user}} stop
systemd.status=systemctl {{.user}} status
systemd.logs=journalctl -xe
